apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../default
- cluster-monitoring-view-binding.yaml
- metrics-reader-token.yaml
- prometheus-metrics-reader-binding.yaml

configMapGenerator:
- envs:
  - params.env
  name: wva-parameters
generatorOptions:
  disableNameSuffixHash: true

patches:
- path: configmap-patch.yaml
  target:
    kind: ConfigMap
    name: wva-variantautoscaling-config
- path: prometheus-patch.yaml
  target:
    kind: Deployment
    name: controller-manager
- path: epp-metrics-token-patch.yaml
  target:
    kind: Secret
    name: epp-metrics-token
- path: epp-metrics-volume-patch.yaml
  target:
    kind: Deployment
    name: controller-manager
- path: monitor-auth-patch.yaml
  target:
    kind: ServiceMonitor
    name: controller-manager-metrics-monitor

replacements:
- source:
    kind: ConfigMap
    version: v1
    name: wva-parameters
    fieldPath: data.wva-controller-image
  targets:
  - select:
      kind: Deployment
      name: controller-manager
    fieldPaths:
    - spec.template.spec.containers.[name=manager].image

namespace: workload-variant-autoscaler-system
