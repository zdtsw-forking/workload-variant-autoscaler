{{- if .Values.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "workload-variant-autoscaler.fullname" . }}-hpa
  namespace: {{ .Values.llmd.namespace }}
  labels:
    {{- include "workload-variant-autoscaler.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    {{- if eq .Values.llmd.scaleTargetKind "LeaderWorkerSet" }}
    apiVersion: leaderworkerset.x-k8s.io/v1
    kind: LeaderWorkerSet
    {{- else }}
    apiVersion: apps/v1
    kind: Deployment
    {{- end }}
    {{- if .Values.llmd.scaleTargetName }}
    name: {{ .Values.llmd.scaleTargetName }}
    {{- else }}
    name: {{ .Values.llmd.deploymentName | default (printf "%s-decode" .Values.llmd.modelName) }}
    {{- end }}
  minReplicas: {{ .Values.hpa.minReplicas }}
  maxReplicas: {{ .Values.hpa.maxReplicas }}
  behavior:
    scaleUp:
      stabilizationWindowSeconds: {{ .Values.hpa.behavior.scaleUp.stabilizationWindowSeconds }}
      selectPolicy: {{ .Values.hpa.behavior.scaleUp.selectPolicy }}
      policies:
      {{- range .Values.hpa.behavior.scaleUp.policies }}
      - type: {{ .type }}
        value: {{ .value }}
        periodSeconds: {{ .periodSeconds }}
      {{- end }}
    scaleDown:
      stabilizationWindowSeconds: {{ .Values.hpa.behavior.scaleDown.stabilizationWindowSeconds }}
      selectPolicy: {{ .Values.hpa.behavior.scaleDown.selectPolicy }}
      policies:
      {{- range .Values.hpa.behavior.scaleDown.policies }}
      - type: {{ .type }}
        value: {{ .value }}
        periodSeconds: {{ .periodSeconds }}
      {{- end }}
  metrics:
  - type: External
    external:
      metric:
        name: wva_desired_replicas
        selector:
          matchLabels:
            variant_name: {{ include "workload-variant-autoscaler.fullname" . }}-va
            exported_namespace: {{ .Values.llmd.namespace }}
            {{- if .Values.wva.controllerInstance }}
            controller_instance: {{ .Values.wva.controllerInstance | quote }}
            {{- end }}
      target:
        type: AverageValue
        averageValue: {{ .Values.hpa.targetAverageValue | quote }}
{{- end }}
